<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>管理后台 · 墨韵图传</title>
  <style>
    :root {
      --bg: #0f0f0f; --card: #1a1a1a; --border: #2a2a2a;
      --text: #e8e0d4; --text2: #8a8278; --accent: #c9a96e;
      --danger: #dd4444; --radius: 10px;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .login-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 40px 36px;
      width: 100%;
      max-width: 380px;
      text-align: center;
    }
    .login-card h1 {
      font-size: 1.1rem;
      color: var(--accent);
      font-weight: 500;
      margin-bottom: 8px;
      letter-spacing: 4px;
    }
    .login-card .subtitle {
      font-size: .8rem;
      color: var(--text2);
      margin-bottom: 28px;
    }
    .login-card input {
      width: 100%;
      padding: 12px 16px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-size: 15px;
      outline: none;
      transition: border-color .2s;
      -webkit-appearance: none;
    }
    .login-card input:focus { border-color: var(--accent); }
    .login-card input::placeholder { color: var(--text2); }
    .login-card button {
      width: 100%;
      margin-top: 16px;
      padding: 12px;
      background: var(--accent);
      color: #111;
      border: none;
      border-radius: var(--radius);
      font-size: .95rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity .2s;
    }
    .login-card button:hover { opacity: .85; }
    .error {
      margin-top: 14px;
      padding: 10px;
      background: rgba(221,68,68,.1);
      border: 1px solid rgba(221,68,68,.25);
      border-radius: 8px;
      color: var(--danger);
      font-size: .83rem;
    }
    .back {
      display: inline-block;
      margin-top: 20px;
      font-size: .78rem;
      color: var(--text2);
      text-decoration: none;
    }
    .back:hover { color: var(--accent); }
  </style>
</head>
<body>
  <div class="login-card">
    <h1>墨 韵 图 传</h1>
    <div class="subtitle">管理后台</div>
    <form method="POST" action="/admin/login">
      <input type="password" name="password" placeholder="请输入管理密码" autofocus required>
      <button type="submit">登 录</button>
    </form>
    <!--ERROR-->
    <a class="back" href="/">← 返回首页</a>
  </div>
</body>
</html>
